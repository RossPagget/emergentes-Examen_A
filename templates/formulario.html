{% extends "base.html" %}
{% block title %}{{ accion }} producto{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">

    <div class="card shadow-sm">
      <div class="card-header bg-dark text-white">
        <h5 class="mb-0">{{ accion }} producto</h5>
      </div>
      <div class="card-body">

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST">

          <div class="mb-3">
            <label class="form-label fw-semibold">Nombre</label>
            <input type="text" name="nombre" class="form-control" required
              value="{{ producto.nombre if producto else '' }}" placeholder="Ej. Teclado Mecánico">
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Categoría</label>
            <select name="categoria" class="form-select" required>
              <option value="">Selecciona...</option>
              {% set cats = ["Periféricos", "Pantallas", "Audio", "Accesorios",
              "Computadoras", "Almacenamiento", "Redes", "Otro"] %}
              {% for cat in cats %}
              <option value="{{ cat }}" {{ 'selected' if producto and producto.categoria==cat else '' }}>
                {{ cat }}
              </option>
              {% endfor %}
            </select>
          </div>

          <div class="row g-3 mb-3">
            <div class="col">
              <label class="form-label fw-semibold">Precio (Bs)</label>
              <input type="number" name="precio" class="form-control" required step="0.01" min="0"
                value="{{ producto.precio if producto else '' }}" placeholder="0.00">
            </div>
            <div class="col">
              <label class="form-label fw-semibold">Stock</label>
              <input type="number" name="stock" class="form-control" required min="0"
                value="{{ producto.stock if producto else '' }}" placeholder="0">
            </div>
          </div>

          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-success">
              {% if accion == 'Editar' %}
              <i class="fas fa-save me-1"></i> Guardar cambios
              {% else %}
              <i class="fas fa-plus-circle me-1"></i> Registrar producto
              {% endif %}
            </button>
            <a href="/" class="btn btn-outline-secondary">Cancelar</a>
          </div>

        </form>
      </div>
    </div>

  </div>
</div>
{% endblock %}
