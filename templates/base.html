<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Inventario{% endblock %} — TechnoVortex</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      background: #f7fafd;
      position: relative;
    }

    .navbar-brand {
      font-weight: 700;
      letter-spacing: .03em;
    }

    .table th {
      white-space: nowrap;
    }

    .badge-categoria {
      font-size: .75rem;
    }

    .stock-low {
      color: #dc3545;
      font-weight: 600;
    }

    .stock-ok {
      color: #198754;
      font-weight: 600;
    }

    .container.pb-5 {
      flex: 1 0 auto;
    }

    footer {
      flex-shrink: 0;
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-expand-md navbar-dark shadow-sm mb-4" style="background-color: #12283f;">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="/">
        <img src="https://tecnovax.com/wp-content/uploads/2023/03/X_RGB-e1679153868457.png" alt="Logo" , width="70" ,
          height="30" , class="d-inline-block align-text-top me-2">TechnoVortex
      </a>
      <div class="d-flex gap-2">
        <a href="/" class="btn btn-outline-light">
          <i class="fas fa-boxes me-2"></i> Productos
        </a>

        <a href="/nuevo" class="btn btn-success">
          <i class="fas fa-plus-circle me-2"></i> Nuevo
        </a>
      </div>
    </div>
  </nav>

  <div class="container pb-5">
    {% block content %}{% endblock %}
  </div>
  <footer class="text-white pt-4 pb-2 mt-auto" style="background-color: #12283f;">
    <div class="container text-center">
      <div class="row">
        <div class="col-md-4 mb-3">
          <i class="fas fa-map-marker-alt mb-2" style="font-size: 24px; color: #f7fafd;"></i>
          <p>Z. Villa Esperanza, Av. Juan Pablo II, Nº 7</p>
        </div>
        <div class="col-md-4 mb-3">
          <i class="fas fa-mobile-alt mb-2" style="font-size: 24px; color: #f7fafd;"></i>
          <p>+591 77789521</p>
        </div>
        <div class="col-md-4 mb-3">
          <i class="fas fa-envelope mb-2" style="font-size: 24px; color: #f7fafd;"></i>
          <p>info@technovortex.com</p>
        </div>
      </div>
    </div>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
